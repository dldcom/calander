<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 일정 & 학습 달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* 체크박스 애니메이션 */
        .todo-checkbox:checked + span {
            text-decoration: line-through;
            color: #94a3b8;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- 메인 캘린더 영역 (좌측) -->
    <div class="flex-1 flex flex-col h-full overflow-hidden w-full relative">
        <!-- 캘린더 상단 헤더 -->
        <header class="bg-white border-b border-slate-200 p-4 flex flex-col sm:flex-row justify-between items-center z-10 shadow-sm gap-4">
            <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                <h1 class="text-xl sm:text-2xl font-bold text-slate-800 flex items-center">
                    <i class="far fa-calendar-alt text-blue-500 mr-2"></i>스마트 캘린더
                </h1>
                <!-- 뷰 전환 탭 -->
                <div class="flex items-center bg-slate-100 rounded-lg p-1">
                    <button class="px-3 py-1.5 text-sm rounded-md text-slate-600 hover:bg-white hover:shadow-sm transition-all" onclick="changeView('year')" id="tab-year">연간</button>
                    <button class="px-3 py-1.5 text-sm rounded-md bg-white shadow-sm font-medium text-blue-600 transition-all" onclick="changeView('month')" id="tab-month">월간</button>
                    <button class="px-3 py-1.5 text-sm rounded-md text-slate-600 hover:bg-white hover:shadow-sm transition-all" onclick="changeView('week')" id="tab-week">주간</button>
                </div>
            </div>
            
            <!-- 날짜 네비게이션 -->
            <div class="flex items-center gap-2 sm:gap-4">
                <button onclick="navigate(-1)" class="p-2 w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-600 transition-colors"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-date-display" class="text-base sm:text-lg font-semibold w-32 sm:w-40 text-center tracking-wide">2026년 4월</h2>
                <button onclick="navigate(1)" class="p-2 w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-600 transition-colors"><i class="fas fa-chevron-right"></i></button>
                <button onclick="goToToday()" class="ml-2 px-3 py-1.5 bg-slate-100 text-sm font-medium rounded-lg hover:bg-slate-200 transition-colors">오늘</button>
            </div>
        </header>

        <!-- 캘린더 렌더링 영역 -->
        <main class="flex-1 overflow-auto bg-slate-50 relative" id="calendar-view">
            <!-- JavaScript로 캘린더가 렌더링됩니다 -->
        </main>
    </div>

    <!-- 우측 사이드바 영역 (할일 및 자동 분석기) -->
    <div class="w-full md:w-[380px] bg-white border-t md:border-t-0 md:border-l border-slate-200 h-1/2 md:h-full flex flex-col shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-20 shrink-0">
        
        <!-- 주간학습안내 AI 파서 -->
        <div class="p-5 border-b border-slate-200 bg-gradient-to-br from-indigo-50 to-blue-50/30">
            <h3 class="font-bold text-indigo-900 mb-1 flex items-center text-lg">
                <i class="fas fa-wand-magic-sparkles text-indigo-500 mr-2"></i>주간학습안내 등록
            </h3>
            <p class="text-[13px] text-slate-500 mb-3 leading-tight">시간표 텍스트를 붙여넣으면 AI가 일정을 자동 등록합니다.</p>
            <textarea id="ai-input" class="w-full h-24 p-3 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent resize-none shadow-inner bg-white/80" placeholder="예: 4월 20일 (월)&#10;1교시 국어, 2교시 수학, 3교시 영어..."></textarea>
            <button id="ai-btn" onclick="parseGuideText()" class="w-full mt-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-robot"></i><span>자동 분석 및 일정 추가</span>
            </button>
        </div>

        <!-- 내 할 일 (To-Do) 목록 -->
        <div class="flex-1 flex flex-col overflow-hidden p-5 bg-white">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center text-lg">
                <i class="far fa-check-square text-emerald-500 mr-2"></i>내 할일
                <span id="todo-count" class="ml-2 text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-medium">0</span>
            </h3>
            
            <div class="flex gap-2 mb-4">
                <input type="text" id="todo-input" class="flex-1 border border-slate-200 bg-slate-50 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:bg-white transition-colors" placeholder="새로운 할일을 입력하세요..." onkeypress="if(event.key === 'Enter') addTodo()">
                <button onclick="addTodo()" class="bg-emerald-500 hover:bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-colors shadow-sm"><i class="fas fa-plus"></i></button>
            </div>
            
            <div id="todo-list" class="flex-1 overflow-y-auto pr-2 space-y-2 pb-10">
                <!-- JavaScript로 할 일 목록이 렌더링됩니다 -->
            </div>
        </div>
    </div>

    <!-- 일정 상세 및 추가 모달 -->
    <div id="event-modal" class="fixed inset-0 bg-slate-900/40 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-200" id="event-modal-content">
            <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg flex items-center gap-2" id="modal-date-title"><i class="far fa-calendar-check"></i> 2026-04-20</h3>
                <button onclick="closeModal()" class="text-white/70 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 bg-slate-50">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">등록된 일정</h4>
                <div id="modal-event-list" class="mb-6 space-y-2 max-h-48 overflow-y-auto pr-2">
                    <!-- 일정 리스트 렌더링 영역 -->
                </div>
                
                <div class="border-t border-slate-200 pt-5 mt-2">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">새 일정 추가</h4>
                    <div class="flex gap-2 mb-3">
                        <input type="time" id="new-event-time" class="border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-32 bg-white shadow-sm">
                        <input type="text" id="new-event-title" class="flex-1 border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm" placeholder="일정 내용을 입력하세요" onkeypress="if(event.key === 'Enter') addEvent()">
                    </div>
                    <button onclick="addEvent()" class="w-full bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-plus text-sm"></i> 추가하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* === 전역 상태 및 환경 변수 === */
        const apiKey = ""; // 실행 환경에서 런타임에 제공되는 Gemini API Key
        
        let events = JSON.parse(localStorage.getItem('smartCal_events')) || [];
        let todos = JSON.parse(localStorage.getItem('smartCal_todos')) || [];
        
        let currentDate = new Date(); // 현재 뷰 기준 날짜
        let currentView = 'month';    // 'year', 'month', 'week'
        let selectedDateStr = null;   // 모달용 선택된 날짜 문자열

        /* === 유틸리티 함수 === */
        const getTodayStr = () => {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        };

        const formatDateStr = (dateObj) => {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        };

        const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();

        const saveData = () => {
            localStorage.setItem('smartCal_events', JSON.stringify(events));
            localStorage.setItem('smartCal_todos', JSON.stringify(todos));
            updateTodoCount();
        };

        const showToast = (message, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 text-white px-5 py-3 rounded-xl shadow-xl z-[60] transform transition-all duration-300 translate-y-10 opacity-0 flex items-center gap-3 font-medium text-sm`;
            toast.classList.add(type === 'success' ? 'bg-slate-800' : 'bg-red-500');
            
            const icon = type === 'success' ? '<i class="fas fa-check-circle text-emerald-400 text-lg"></i>' : '<i class="fas fa-exclamation-triangle text-yellow-300 text-lg"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            document.body.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);
            
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        /* === 캘린더 네비게이션 및 렌더링 === */
        function updateHeader() {
            const header = document.getElementById('current-date-display');
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth() + 1;
            
            if (currentView === 'year') {
                header.innerText = `${y}년`;
            } else if (currentView === 'month') {
                header.innerText = `${y}년 ${m}월`;
            } else if (currentView === 'week') {
                const curr = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
                const dayOfWeek = curr.getDay();
                const start = new Date(curr);
                start.setDate(curr.getDate() - dayOfWeek);
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                
                let txt = `${start.getMonth()+1}월 ${start.getDate()}일 - `;
                if (start.getMonth() !== end.getMonth() || start.getFullYear() !== end.getFullYear()) {
                    txt += `${end.getMonth()+1}월 `;
                }
                txt += `${end.getDate()}일`;
                header.innerText = txt;
            }
        }

        function navigate(dir) {
            if (currentView === 'year') {
                currentDate.setFullYear(currentDate.getFullYear() + dir);
            } else if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() + dir);
            } else if (currentView === 'week') {
                currentDate.setDate(currentDate.getDate() + (dir * 7));
            }
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function goToMonth(year, month) {
            currentDate = new Date(year, month, 1);
            changeView('month');
        }

        function changeView(view) {
            currentView = view;
            const tabs = ['year', 'month', 'week'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(t === view) el.className = "px-3 py-1.5 text-sm rounded-md bg-white shadow-sm font-bold text-blue-600 transition-all";
                else el.className = "px-3 py-1.5 text-sm rounded-md text-slate-500 hover:bg-slate-200 hover:text-slate-700 transition-all font-medium";
            });
            renderCalendar();
        }

        function renderCalendar() {
            updateHeader();
            const container = document.getElementById('calendar-view');
            container.innerHTML = ''; // clear

            if (currentView === 'month') renderMonthView(container);
            else if (currentView === 'week') renderWeekView(container);
            else if (currentView === 'year') renderYearView(container);
        }

        function renderMonthView(container) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = getDaysInMonth(year, month);
            const todayStr = getTodayStr();
            
            let html = `<div class="grid grid-cols-7 border-l border-t border-slate-200 h-full min-h-[500px]">`;
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            
            // 요일 헤더
            days.forEach((d, i) => {
                const color = i === 0 ? 'text-red-500' : (i === 6 ? 'text-blue-500' : 'text-slate-600');
                html += `<div class="bg-white text-center py-2 font-bold text-sm border-b border-r border-slate-200 ${color}">${d}</div>`;
            });
            
            // 이전 달 공백
            for(let i=0; i<firstDay; i++) {
                html += `<div class="bg-slate-50/50 border-b border-r border-slate-200 min-h-[100px]"></div>`;
            }
            
            // 해당 월 일자
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dayEvents = events.filter(e => e.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));
                const isToday = dateStr === todayStr;
                const dayOfWeek = new Date(year, month, i).getDay();
                const numColor = dayOfWeek === 0 ? 'text-red-500' : (dayOfWeek === 6 ? 'text-blue-500' : 'text-slate-700');
                
                const numClass = isToday 
                    ? 'bg-blue-600 text-white font-bold rounded-full w-7 h-7 flex items-center justify-center ml-auto shadow-sm' 
                    : `${numColor} font-medium ml-auto p-1`;

                html += `
                <div class="bg-white min-h-[100px] p-1.5 border-b border-r border-slate-200 cursor-pointer hover:bg-blue-50/30 transition-colors relative flex flex-col group" onclick="openEventModal('${dateStr}')">
                    <div class="${numClass}">${i}</div>
                    <div class="flex-1 flex flex-col gap-1 mt-1 overflow-hidden">
                        ${dayEvents.slice(0, 4).map(e => `
                            <div class="text-[11px] leading-tight bg-blue-100 text-blue-800 rounded px-1.5 py-0.5 truncate border-l-2 border-blue-500" title="${e.title}">
                                ${e.time ? `<span class="font-bold opacity-70 mr-1">${e.time}</span>` : ''}${e.title}
                            </div>
                        `).join('')}
                        ${dayEvents.length > 4 ? `<div class="text-[10px] text-slate-500 font-medium pl-1 mt-0.5">+${dayEvents.length - 4}개 더보기</div>` : ''}
                    </div>
                </div>`;
            }
            
            // 다음 달 공백
            const lastDay = new Date(year, month, daysInMonth).getDay();
            for(let i=lastDay+1; i<=6; i++) {
                html += `<div class="bg-slate-50/50 border-b border-r border-slate-200 min-h-[100px]"></div>`;
            }
            
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderWeekView(container) {
            const curr = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
            const dayOfWeek = curr.getDay();
            const startOfWeek = new Date(curr);
            startOfWeek.setDate(curr.getDate() - dayOfWeek);
            const todayStr = getTodayStr();
            
            let html = `<div class="grid grid-cols-7 border-l border-t border-slate-200 h-full min-h-[500px]">`;
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            
            for(let i=0; i<7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                const dateStr = formatDateStr(d);
                const isToday = dateStr === todayStr;
                const dayColor = i === 0 ? 'text-red-500' : (i === 6 ? 'text-blue-500' : 'text-slate-600');
                
                const headerBg = isToday ? 'bg-blue-50' : 'bg-white';
                
                html += `
                <div class="flex flex-col border-b border-r border-slate-200">
                    <div class="${headerBg} text-center py-3 border-b border-slate-200">
                        <div class="font-bold text-sm ${dayColor}">${days[i]}</div>
                        <div class="text-xl mt-1 ${isToday ? 'bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center mx-auto shadow-sm font-bold' : 'text-slate-800'}">${d.getDate()}</div>
                    </div>
                    <div class="flex-1 bg-white p-2 cursor-pointer hover:bg-slate-50 transition-colors flex flex-col gap-2 min-h-[400px]" onclick="openEventModal('${dateStr}')">
                        ${events.filter(e => e.date === dateStr).sort((a,b) => a.time.localeCompare(b.time)).map(e => `
                            <div class="bg-indigo-50 text-indigo-900 rounded-lg p-2 text-xs border border-indigo-100 shadow-sm hover:shadow transition-shadow">
                                <div class="font-bold text-indigo-600 mb-0.5 flex items-center gap-1">
                                    <i class="far fa-clock"></i> ${e.time || '종일'}
                                </div>
                                <div class="font-medium whitespace-pre-wrap leading-tight">${e.title}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderYearView(container) {
            const year = currentDate.getFullYear();
            const todayStr = getTodayStr();
            let html = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-6">`;
            
            for(let month=0; month<12; month++) {
                html += `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 hover:shadow-md transition-shadow">
                    <h3 class="font-bold text-lg text-center mb-4 cursor-pointer hover:text-blue-600 transition-colors flex items-center justify-center gap-2" onclick="goToMonth(${year}, ${month})">
                        ${month+1}월 <i class="fas fa-arrow-right text-[10px] opacity-50"></i>
                    </h3>
                    <div class="grid grid-cols-7 gap-y-2 gap-x-1 text-xs text-center">
                        <div class="text-red-400 font-medium">일</div><div class="text-slate-400 font-medium">월</div><div class="text-slate-400 font-medium">화</div><div class="text-slate-400 font-medium">수</div><div class="text-slate-400 font-medium">목</div><div class="text-slate-400 font-medium">금</div><div class="text-blue-400 font-medium">토</div>
                `;
                
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = getDaysInMonth(year, month);
                
                for(let i=0; i<firstDay; i++) html += `<div></div>`;
                for(let i=1; i<=daysInMonth; i++) {
                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const hasEvent = events.some(e => e.date === dateStr);
                    const isToday = dateStr === todayStr;
                    
                    let classes = "w-7 h-7 mx-auto flex items-center justify-center rounded-full cursor-pointer transition-all ";
                    if (isToday) classes += "bg-blue-600 text-white font-bold shadow-md transform hover:scale-110 ";
                    else if (hasEvent) classes += "bg-blue-100 text-blue-800 font-bold border border-blue-200 hover:bg-blue-200 ";
                    else classes += "text-slate-600 hover:bg-slate-100 ";
                    
                    html += `<div class="${classes}" onclick="openEventModal('${dateStr}')">${i}</div>`;
                }
                html += `</div></div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        /* === 모달(일정 추가/조회) 로직 === */
        function openEventModal(dateStr) {
            selectedDateStr = dateStr;
            document.getElementById('modal-date-title').innerHTML = `<i class="far fa-calendar-check"></i> ${dateStr}`;
            renderEventModalList();
            
            const modal = document.getElementById('event-modal');
            const modalContent = document.getElementById('event-modal-content');
            modal.classList.remove('hidden');
            
            // Animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
            
            document.getElementById('new-event-title').focus();
        }

        function closeModal() {
            const modal = document.getElementById('event-modal');
            const modalContent = document.getElementById('event-modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
            
            document.getElementById('new-event-title').value = '';
            document.getElementById('new-event-time').value = '';
        }

        function renderEventModalList() {
            const listContainer = document.getElementById('modal-event-list');
            const dayEvents = events.filter(e => e.date === selectedDateStr).sort((a,b) => a.time.localeCompare(b.time));
            
            if (dayEvents.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-4 text-slate-400 text-sm bg-slate-100 rounded-lg border border-dashed border-slate-300">등록된 일정이 없습니다.</div>`;
                return;
            }
            
            listContainer.innerHTML = dayEvents.map(e => `
                <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-slate-200 shadow-sm hover:shadow transition-shadow group">
                    <div class="flex flex-col">
                        ${e.time ? `<span class="text-xs font-bold text-blue-600 mb-0.5"><i class="far fa-clock"></i> ${e.time}</span>` : ''}
                        <span class="text-sm font-medium text-slate-800">${e.title}</span>
                    </div>
                    <button onclick="deleteEvent('${e.id}')" class="text-slate-300 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-red-50 opacity-0 group-hover:opacity-100">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        function addEvent() {
            const titleInput = document.getElementById('new-event-title');
            const timeInput = document.getElementById('new-event-time');
            const title = titleInput.value.trim();
            const time = timeInput.value;
            
            if(!title) return showToast('일정 내용을 입력해주세요.', 'error');
            
            events.push({
                id: Date.now().toString() + Math.random().toString(16).slice(2),
                date: selectedDateStr,
                time: time,
                title: title
            });
            
            saveData();
            titleInput.value = '';
            timeInput.value = '';
            
            renderEventModalList();
            renderCalendar();
            showToast('일정이 추가되었습니다.');
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            saveData();
            renderEventModalList();
            renderCalendar();
        }

        /* === 내 할일 (To-Do) 로직 === */
        function updateTodoCount() {
            const pending = todos.filter(t => !t.completed).length;
            document.getElementById('todo-count').innerText = pending;
        }

        function renderTodos() {
            const container = document.getElementById('todo-list');
            if (todos.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm flex flex-col items-center gap-2"><i class="fas fa-clipboard-list text-3xl opacity-50"></i>할 일이 없습니다.</div>`;
                return;
            }

            container.innerHTML = todos.sort((a,b) => a.completed - b.completed || b.createdAt.localeCompare(a.createdAt)).map(todo => `
                <div class="group flex items-center justify-between p-3 bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-100 transition-colors">
                    <label class="flex items-center gap-3 cursor-pointer flex-1">
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo('${todo.id}')" class="todo-checkbox w-5 h-5 rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 cursor-pointer accent-emerald-500">
                        <span class="text-sm font-medium text-slate-700 flex-1 break-all select-none">${todo.text}</span>
                    </label>
                    <button onclick="deleteTodo('${todo.id}')" class="text-slate-300 hover:text-red-500 transition-colors p-1.5 rounded-lg opacity-0 group-hover:opacity-100">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
            updateTodoCount();
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if(!text) return;
            
            todos.push({
                id: Date.now().toString() + Math.random().toString(16).slice(2),
                text: text,
                completed: false,
                createdAt: new Date().toISOString()
            });
            
            saveData();
            input.value = '';
            renderTodos();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if(todo) {
                todo.completed = !todo.completed;
                saveData();
                renderTodos();
            }
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveData();
            renderTodos();
        }

        /* === Gemini API 연동 (주간학습안내 자동 분석) === */
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                    return await res.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        async function parseGuideText() {
            const btn = document.getElementById('ai-btn');
            const inputEl = document.getElementById('ai-input');
            const text = inputEl.value.trim();
            
            if(!text) {
                inputEl.focus();
                return showToast('분석할 시간표나 학습안내 텍스트를 입력해주세요.', 'error');
            }
            
            // 로딩 상태 UI 처리
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i><span>AI 분석 중...</span>`;
            btn.classList.replace('bg-indigo-600', 'bg-indigo-400');
            
            const systemPrompt = `사용자가 입력한 학교 '주간학습안내'나 시간표 텍스트를 분석하여 수업 일정을 찾아라.
반드시 아래 정의된 JSON 배열(Array) 형태로만 응답해라. 마크다운(\`\`\`json) 등 부가적인 텍스트는 절대 포함하지 마라.
응답 스키마:
[
  {
    "date": "YYYY-MM-DD",
    "time": "HH:mm",
    "title": "일정 내용 (예: 1교시 국어)"
  }
]
규칙:
1. 입력 텍스트에서 날짜를 찾아 YYYY-MM-DD 형식으로 변환해라. 연도가 없으면 ${currentDate.getFullYear()}년을, 월이 없으면 ${currentDate.getMonth() + 1}월을 기준으로 삼아라.
2. 'n교시' 라는 단어가 있으면 대략적인 시작 시간으로 매핑해라. (1교시: 09:00, 2교시: 09:50, 3교시: 10:40, 4교시: 11:30, 5교시: 13:00, 6교시: 13:50). 없으면 시간표나 일정에서 유추해라.
3. title에는 몇교시인지와 과목명(또는 할일)을 요약해서 적어라.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                                date: { type: "STRING" },
                                time: { type: "STRING" },
                                title: { type: "STRING" }
                            },
                            required: ["date", "title"]
                        }
                    }
                }
            };

            try {
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (result && result.candidates && result.candidates[0].content.parts[0].text) {
                    const jsonText = result.candidates[0].content.parts[0].text;
                    const parsedEvents = JSON.parse(jsonText);
                    
                    if(parsedEvents.length > 0) {
                        parsedEvents.forEach(evt => {
                            events.push({
                                id: Date.now().toString() + Math.random().toString(16).slice(2),
                                date: evt.date,
                                time: evt.time || '',
                                title: evt.title
                            });
                        });
                        saveData();
                        renderCalendar();
                        inputEl.value = ''; // 성공 시 입력창 비우기
                        showToast(`성공적으로 ${parsedEvents.length}개의 일정을 분석하여 달력에 추가했습니다!`);
                        
                        // 추가된 일정 날짜로 달력 이동 (첫 번째 일정 기준)
                        const firstDate = new Date(parsedEvents[0].date);
                        if(!isNaN(firstDate)) {
                            currentDate = firstDate;
                            if(currentView === 'year') changeView('month');
                            else renderCalendar();
                        }

                    } else {
                        showToast('텍스트에서 일정을 찾지 못했습니다. 형식을 확인해주세요.', 'error');
                    }
                } else {
                    throw new Error("Invalid API Response");
                }
            } catch(error) {
                console.error("AI Parse Error:", error);
                showToast('AI 분석 중 오류가 발생했습니다. (API Key가 설정되었는지 확인해주세요.)', 'error');
            } finally {
                // UI 원상복구
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-robot"></i><span>자동 분석 및 일정 추가</span>`;
                btn.classList.replace('bg-indigo-400', 'bg-indigo-600');
            }
        }

        /* === 초기화 === */
        window.onload = () => {
            renderCalendar();
            renderTodos();
            
            // 모달 바깥 클릭 시 닫기
            document.getElementById('event-modal').addEventListener('click', (e) => {
                if(e.target.id === 'event-modal') closeModal();
            });
        };

    </script>
</body>
</html>
